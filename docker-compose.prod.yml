services:
  postgres:
    image: postgres:17-alpine
    container_name: resumemaster_db
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: resumemaster_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    image: resumemaster:latest
    container_name: resumemaster_app
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/resumemaster_db
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - postgres
    restart: always

volumes:
  postgres_data: